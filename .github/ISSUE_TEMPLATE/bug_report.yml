name: Bug report
description: Something in takt-mcp is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please do not include your API key or any secrets.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The MCP client used and the tool call (or request sequence) that triggers it.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: takt-mcp version
      description: Output of `takt-mcp --version`.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug output (optional)
      description: Relevant stderr lines with TAKT_DEBUG=1. Redact any secrets.
      render: shell
