name: Release
# GitHub-only release flow (no npm). On every push to main this either:
#   - opens/updates a "Version Packages" PR when unreleased changesets exist, or
#   - once that PR merges and package.json's version bumps, tags the commit and
#     publishes a GitHub Release from the matching CHANGELOG section.
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pinned to full commit SHAs; trailing comment tracks the version.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Gate before any release artifact is produced.
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      # When changesets are pending, open/update the Version Packages PR.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # When the version on main has no tag yet, tag it and cut a GitHub Release
      # from the matching CHANGELOG section.
      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — nothing to release."
            exit 0
          fi
          notes="$(awk -v ver="## ${version}" '
            $0==ver {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md)"
          git tag "$tag"
          git push origin "$tag"
          printf '%s\n' "$notes" | gh release create "$tag" --title "$tag" --notes-file - --latest
