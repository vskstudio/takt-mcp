name: CI
on:
  push:
    branches: [main]
  pull_request:
# Least privilege: CI only reads the repo.
permissions:
  contents: read
# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Exercise the Node 18 support floor and the current LTS. Both pinned
        # (no floating `latest`) so CI never resolves an unverified runtime.
        node: ['18', '20']
    name: build (node@${{ matrix.node }})
    steps:
      # Third-party actions pinned to a full commit SHA (supply-chain
      # hardening); the trailing comment tracks the human-readable version.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
